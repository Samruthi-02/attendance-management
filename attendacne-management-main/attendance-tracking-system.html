<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Tracking System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@mui/material@5.14.20/umd/material-ui.development.js"></script>
    <script src="https://unpkg.com/@mui/icons-material@5.14.20/umd/material-ui-icons.development.js"></script>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Box, Typography, Button, Card, CardContent, TextField, Grid, 
            Paper, Table, TableBody, TableCell, TableContainer, TableHead, 
            TableRow, Chip, IconButton, Select, MenuItem, FormControl, 
            InputLabel, FormControlLabel, Switch, Avatar, LinearProgress,
            Dialog, DialogTitle, DialogContent, DialogActions
        } = MaterialUI;
        const { 
            ArrowBack, AccessTime, CheckCircle, Cancel, Schedule,
            Person, LocationOn, TrendingUp, Notifications, PlayArrow,
            Stop, Timer, Map, Directions, Home, Work
        } = MaterialUIIcons;

        const AttendanceTrackingSystem = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [attendanceRecords, setAttendanceRecords] = useState([
                {
                    id: 1,
                    employeeName: 'John Doe',
                    employeeId: 'EMP001',
                    department: 'Engineering',
                    checkIn: '09:00 AM',
                    checkOut: '06:00 PM',
                    date: '2024-01-15',
                    status: 'present',
                    location: 'Office',
                    totalHours: '9h 0m',
                    breakTime: '1h 0m'
                },
                {
                    id: 2,
                    employeeName: 'Jane Smith',
                    employeeId: 'EMP002',
                    department: 'HR',
                    checkIn: '08:45 AM',
                    checkOut: '05:30 PM',
                    date: '2024-01-15',
                    status: 'present',
                    location: 'Remote',
                    totalHours: '8h 45m',
                    breakTime: '45m'
                },
                {
                    id: 3,
                    employeeName: 'Mike Johnson',
                    employeeId: 'EMP003',
                    department: 'Sales',
                    checkIn: null,
                    checkOut: null,
                    date: '2024-01-15',
                    status: 'absent',
                    location: null,
                    totalHours: '0h 0m',
                    breakTime: '0m'
                }
            ]);

            const [currentSession, setCurrentSession] = useState({
                isCheckedIn: false,
                checkInTime: null,
                checkOutTime: null,
                currentLocation: 'Office',
                breakStartTime: null,
                totalBreakTime: 0
            });

            const [showAnalytics, setShowAnalytics] = useState(false);
            const [showLocation, setShowLocation] = useState(false);
            const [showReports, setShowReports] = useState(false);
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [selectedDepartment, setSelectedDepartment] = useState('all');

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const handleCheckIn = () => {
                const now = new Date();
                setCurrentSession({
                    isCheckedIn: true,
                    checkInTime: now.toLocaleTimeString(),
                    checkOutTime: null,
                    currentLocation: 'Office',
                    breakStartTime: null,
                    totalBreakTime: 0
                });
                
                const newRecord = {
                    id: attendanceRecords.length + 1,
                    employeeName: 'Current User',
                    employeeId: 'EMP000',
                    department: 'General',
                    checkIn: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    checkOut: null,
                    date: selectedDate,
                    status: 'present',
                    location: 'Office',
                    totalHours: 'Calculating...',
                    breakTime: '0m'
                };
                
                setAttendanceRecords([newRecord, ...attendanceRecords]);
                alert('Checked in successfully!');
            };

            const handleCheckOut = () => {
                const now = new Date();
                setCurrentSession({
                    ...currentSession,
                    isCheckedIn: false,
                    checkOutTime: now.toLocaleTimeString()
                });
                
                setAttendanceRecords(prev => 
                    prev.map(record => 
                        record.employeeId === 'EMP000' && record.date === selectedDate
                            ? { 
                                ...record, 
                                checkOut: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                                totalHours: calculateHours(currentSession.checkInTime, now.toLocaleTimeString())
                            }
                            : record
                    )
                );
                alert('Checked out successfully!');
            };

            const calculateHours = (checkIn, checkOut) => {
                if (!checkIn || !checkOut) return '0h 0m';
                const [inHour, inMin] = checkIn.split(':').map(Number);
                const [outHour, outMin] = checkOut.split(':').map(Number);
                const totalMinutes = (outHour * 60 + outMin) - (inHour * 60 + inMin);
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;
                return `${hours}h ${minutes}m`;
            };

            const getStatusColor = (status) => {
                switch (status) {
                    case 'present': return '#4caf50';
                    case 'absent': return '#f44336';
                    case 'late': return '#ff9800';
                    case 'half-day': return '#2196f3';
                    default: return '#757575';
                }
            };

            const filteredRecords = attendanceRecords.filter(record => {
                const matchesDate = record.date === selectedDate;
                const matchesDepartment = selectedDepartment === 'all' || record.department === selectedDepartment;
                return matchesDate && matchesDepartment;
            });

            const stats = {
                totalEmployees: attendanceRecords.length,
                presentToday: attendanceRecords.filter(r => r.status === 'present').length,
                absentToday: attendanceRecords.filter(r => r.status === 'absent').length,
                averageHours: '8h 30m'
            };

            return (
                <Box sx={{ p: 3, minHeight: '100vh', backgroundColor: '#ffffff' }}>
                    {/* Header */}
                    <Box sx={{ 
                        backgroundColor: '#1976d2', 
                        color: 'white', 
                        p: 3, 
                        display: 'flex', 
                        justifyContent: 'space-between',
                        alignItems: 'center'
                    }}>
                        <Box sx={{ display: 'flex', alignItems: 'center', gap: 2 }}>
                            <IconButton 
                                color="inherit" 
                                onClick={() => window.history.back()}
                                sx={{ mr: 1 }}
                            >
                                <ArrowBack />
                            </IconButton>
                            <Typography variant="h4">
                                Attendance Tracking System
                            </Typography>
                        </Box>
                        <Box sx={{ display: 'flex', gap: 1 }}>
                            <Button 
                                color="inherit" 
                                onClick={() => setShowAnalytics(!showAnalytics)}
                                startIcon={<TrendingUp />}
                            >
                                Analytics
                            </Button>
                            <Button 
                                color="inherit" 
                                onClick={() => setShowLocation(!showLocation)}
                                startIcon={<LocationOn />}
                            >
                                Location
                            </Button>
                            <Button 
                                color="inherit" 
                                onClick={() => setShowReports(!showReports)}
                                startIcon={<Notifications />}
                            >
                                Reports
                            </Button>
                        </Box>
                    </Box>

                    <Box sx={{ p: 3 }}>
                        {/* Current Time and Status */}
                        <Card sx={{ mb: 3 }}>
                            <CardContent>
                                <Grid container spacing={2} alignItems="center">
                                    <Grid item xs={12} md={6}>
                                        <Typography variant="h3" color="primary" gutterBottom>
                                            {currentTime.toLocaleTimeString()}
                                        </Typography>
                                        <Typography variant="h6" color="text.secondary">
                                            {currentTime.toLocaleDateString('en-US', { 
                                                weekday: 'long', 
                                                year: 'numeric', 
                                                month: 'long', 
                                                day: 'numeric' 
                                            })}
                                        </Typography>
                                    </Grid>
                                    <Grid item xs={12} md={6}>
                                        <Box sx={{ display: 'flex', gap: 2, justifyContent: 'center' }}>
                                            {!currentSession.isCheckedIn ? (
                                                <Button
                                                    variant="contained"
                                                    color="success"
                                                    size="large"
                                                    startIcon={<PlayArrow />}
                                                    onClick={handleCheckIn}
                                                    sx={{ minWidth: 150 }}
                                                >
                                                    Check In
                                                </Button>
                                            ) : (
                                                <Button
                                                    variant="contained"
                                                    color="error"
                                                    size="large"
                                                    startIcon={<Stop />}
                                                    onClick={handleCheckOut}
                                                    sx={{ minWidth: 150 }}
                                                >
                                                    Check Out
                                                </Button>
                                            )}
                                        </Box>
                                        {currentSession.isCheckedIn && (
                                            <Typography variant="body2" color="success.main" sx={{ mt: 1, textAlign: 'center' }}>
                                                Checked in at: {currentSession.checkInTime}
                                            </Typography>
                                        )}
                                    </Grid>
                                </Grid>
                            </CardContent>
                        </Card>

                        {/* Analytics Section */}
                        {showAnalytics && (
                            <Card sx={{ mb: 3 }}>
                                <CardContent>
                                    <Typography variant="h6" gutterBottom>
                                        Attendance Analytics
                                    </Typography>
                                    <Grid container spacing={2}>
                                        <Grid item xs={12} sm={3}>
                                            <Paper sx={{ p: 2, textAlign: 'center' }}>
                                                <Typography variant="h4" color="primary">{stats.totalEmployees}</Typography>
                                                <Typography variant="body2">Total Employees</Typography>
                                            </Paper>
                                        </Grid>
                                        <Grid item xs={12} sm={3}>
                                            <Paper sx={{ p: 2, textAlign: 'center' }}>
                                                <Typography variant="h4" color="success.main">{stats.presentToday}</Typography>
                                                <Typography variant="body2">Present Today</Typography>
                                            </Paper>
                                        </Grid>
                                        <Grid item xs={12} sm={3}>
                                            <Paper sx={{ p: 2, textAlign: 'center' }}>
                                                <Typography variant="h4" color="error.main">{stats.absentToday}</Typography>
                                                <Typography variant="body2">Absent Today</Typography>
                                            </Paper>
                                        </Grid>
                                        <Grid item xs={12} sm={3}>
                                            <Paper sx={{ p: 2, textAlign: 'center' }}>
                                                <Typography variant="h4" color="warning.main">{stats.averageHours}</Typography>
                                                <Typography variant="body2">Average Hours</Typography>
                                            </Paper>
                                        </Grid>
                                    </Grid>
                                </CardContent>
                            </Card>
                        )}

                        {/* Location Tracking */}
                        {showLocation && (
                            <Card sx={{ mb: 3 }}>
                                <CardContent>
                                    <Typography variant="h6" gutterBottom>
                                        Location Tracking
                                    </Typography>
                                    <Grid container spacing={2}>
                                        <Grid item xs={12} sm={6}>
                                            <Paper sx={{ p: 2, textAlign: 'center' }}>
                                                <LocationOn color="primary" sx={{ fontSize: 40 }} />
                                                <Typography variant="h6" sx={{ mt: 1 }}>Current Location</Typography>
                                                <Typography variant="body1">Office - Main Building</Typography>
                                                <Typography variant="body2" color="text.secondary">
                                                    GPS: 13.0827° N, 80.2707° E
                                                </Typography>
                                            </Paper>
                                        </Grid>
                                        <Grid item xs={12} sm={6}>
                                            <Paper sx={{ p: 2, textAlign: 'center' }}>
                                                <Map color="secondary" sx={{ fontSize: 40 }} />
                                                <Typography variant="h6" sx={{ mt: 1 }}>Geofence Status</Typography>
                                                <Chip 
                                                    label="Within Office Area" 
                                                    color="success" 
                                                    size="small" 
                                                    sx={{ mt: 1 }}
                                                />
                                                <Typography variant="body2" color="text.secondary" sx={{ mt: 1 }}>
                                                    Last updated: {currentTime.toLocaleTimeString()}
                                                </Typography>
                                            </Paper>
                                        </Grid>
                                    </Grid>
                                </CardContent>
                            </Card>
                        )}

                        {/* Reports Section */}
                        {showReports && (
                            <Card sx={{ mb: 3 }}>
                                <CardContent>
                                    <Typography variant="h6" gutterBottom>
                                        Quick Reports
                                    </Typography>
                                    <Grid container spacing={2}>
                                        <Grid item xs={12} sm={4}>
                                            <Button variant="outlined" fullWidth startIcon={<Schedule />}>
                                                Daily Report
                                            </Button>
                                        </Grid>
                                        <Grid item xs={12} sm={4}>
                                            <Button variant="outlined" fullWidth startIcon={<TrendingUp />}>
                                                Weekly Summary
                                            </Button>
                                        </Grid>
                                        <Grid item xs={12} sm={4}>
                                            <Button variant="outlined" fullWidth startIcon={<Notifications />}>
                                                Monthly Analytics
                                            </Button>
                                        </Grid>
                                    </Grid>
                                </CardContent>
                            </Card>
                        )}

                        {/* Filters */}
                        <Card sx={{ mb: 3 }}>
                            <CardContent>
                                <Grid container spacing={2}>
                                    <Grid item xs={12} sm={6}>
                                        <TextField
                                            fullWidth
                                            type="date"
                                            label="Select Date"
                                            value={selectedDate}
                                            onChange={(e) => setSelectedDate(e.target.value)}
                                            InputLabelProps={{ shrink: true }}
                                        />
                                    </Grid>
                                    <Grid item xs={12} sm={6}>
                                        <FormControl fullWidth>
                                            <InputLabel>Department</InputLabel>
                                            <Select
                                                value={selectedDepartment}
                                                onChange={(e) => setSelectedDepartment(e.target.value)}
                                            >
                                                <MenuItem value="all">All Departments</MenuItem>
                                                <MenuItem value="Engineering">Engineering</MenuItem>
                                                <MenuItem value="HR">HR</MenuItem>
                                                <MenuItem value="Sales">Sales</MenuItem>
                                                <MenuItem value="Marketing">Marketing</MenuItem>
                                            </Select>
                                        </FormControl>
                                    </Grid>
                                </Grid>
                            </CardContent>
                        </Card>

                        {/* Attendance Records Table */}
                        <Card>
                            <CardContent>
                                <Typography variant="h6" gutterBottom>
                                    Attendance Records
                                </Typography>
                                <TableContainer component={Paper} elevation={0}>
                                    <Table>
                                        <TableHead>
                                            <TableRow>
                                                <TableCell>Employee</TableCell>
                                                <TableCell>Department</TableCell>
                                                <TableCell>Check In</TableCell>
                                                <TableCell>Check Out</TableCell>
                                                <TableCell>Total Hours</TableCell>
                                                <TableCell>Location</TableCell>
                                                <TableCell>Status</TableCell>
                                                <TableCell>Actions</TableCell>
                                            </TableRow>
                                        </TableHead>
                                        <TableBody>
                                            {filteredRecords.map((record) => (
                                                <TableRow key={record.id} hover>
                                                    <TableCell>
                                                        <Box sx={{ display: 'flex', alignItems: 'center', gap: 1 }}>
                                                            <Avatar sx={{ width: 32, height: 32 }}>
                                                                <Person />
                                                            </Avatar>
                                                            <Box>
                                                                <Typography variant="body2" fontWeight="medium">
                                                                    {record.employeeName}
                                                                </Typography>
                                                                <Typography variant="caption" color="text.secondary">
                                                                    {record.employeeId}
                                                                </Typography>
                                                            </Box>
                                                        </Box>
                                                    </TableCell>
                                                    <TableCell>{record.department}</TableCell>
                                                    <TableCell>
                                                        {record.checkIn || (
                                                            <Chip label="Not Checked In" size="small" color="error" />
                                                        )}
                                                    </TableCell>
                                                    <TableCell>
                                                        {record.checkOut || (
                                                            <Chip label="Not Checked Out" size="small" color="warning" />
                                                        )}
                                                    </TableCell>
                                                    <TableCell>{record.totalHours}</TableCell>
                                                    <TableCell>
                                                        <Box sx={{ display: 'flex', alignItems: 'center', gap: 1 }}>
                                                            <LocationOn sx={{ fontSize: 16, color: 'text.secondary' }} />
                                                            {record.location || 'N/A'}
                                                        </Box>
                                                    </TableCell>
                                                    <TableCell>
                                                        <Chip
                                                            label={record.status}
                                                            size="small"
                                                            sx={{
                                                                backgroundColor: getStatusColor(record.status),
                                                                color: 'white'
                                                            }}
                                                        />
                                                    </TableCell>
                                                    <TableCell>
                                                        <IconButton size="small" color="primary">
                                                            <Timer />
                                                        </IconButton>
                                                    </TableCell>
                                                </TableRow>
                                            ))}
                                        </TableBody>
                                    </Table>
                                </TableContainer>
                            </CardContent>
                        </Card>
                    </Box>
                </Box>
            );
        };

        ReactDOM.render(<AttendanceTrackingSystem />, document.getElementById('root'));
    </script>
</body>
</html>
